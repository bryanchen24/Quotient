  <body>
    <!-- Universal Side Bar -->
    <aside class="side-bar-container">
      <img src="assets/logo_brittany.png" />
      <nav>
        <ul>
          <li>Home</li>
          <li>About</li>
          <li>Popular</li>
        </ul>
      </nav>
    </aside>

    <!-- Search for Quotes -->
    <!-- <form
      onsubmit="
        quoteKeyword();
        return false;
      "
    >

    <main class="main-content">
      <!-- Universal Search Bar -->
      <!-- Search for any keyword, and it will return both the author and quotes results -->
      <div class="nav-bar-container">
        <form id="search-bar" onsubmit="">
          <input type="search" id="search-bar" required />
        </form>
      </div>

      <!-- Display Quotes Feed -->
      <div class="quote-feed">
        <div class="feed-box">
          <h3>Insert the quote here</h3>
          <h4>Insert the author here</h4>
          <!-- add feature to click on author to be able to act as it is searching it up -->
          <!-- same for a word in the quote as well! -->

          <div class="quote-interact">
            <div class="like-quote">
              <!-- <img src="/assets/interactions/heart_default.png" /> -->
              <i class="fa-regular fa-heart" style="font-size: 50px"></i>
              <!-- <i class="fa-solid fa-heart" style="font-size: 50px"></i> -->
            </div>
            <div class="comment-quote">
              <!-- <img src="/assets/interactions/comment.png" /> -->
              <i class="fa-regular fa-comment" style="font-size: 50px"></i>
              <!-- <i class="fa-solid fa-comment"></i> -->
            </div>
            <div class="fav-quote">
              <!-- <img src="/assets/interactions/favorite_default.png" /> -->
              <i class="fa-regular fa-star" style="font-size: 50px"></i>
              <!-- <i class="fa-solid fa-star"></i> -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
