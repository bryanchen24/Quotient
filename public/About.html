<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results Page</title>

    <link rel="stylesheet" href="Main.css" />

    <!-- Interaction icons -->
    <script
      src="https://kit.fontawesome.com/17b497edf4.js"
      crossorigin="anonymous"
    ></script>

    <script src="Quote.js" defer></script>
  </head>
  <body>
    <!-- Universal Side Bar -->
    <aside class="side-bar-container">
      <img src="assets/logo_brittany.png" />
      <nav>
        <ul>
          <li><a href="/Home.html">Home</a></li>
          <!-- scroll through quotes, interact with them, and search for quotes -->
          <li><a href="/About.html">About</a></li>
          <!-- gives the about section -->
          <li><a href="/Saved.html">Saved</a></li>
          <!-- display the list of saved quotes -->
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <!-- Universal Search Bar -->
      <!-- Search for any keyword, and it will return both the author and quotes results -->
      <div class="nav-bar-container">
        <form id="search-bar" onsubmit="">
          <input type="search" id="search-bar" required />
        </form>
      </div>
    </main>

    <!-- Butterfly Background -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.birds.min.js"></script>
    <script>
      VANTA.BIRDS({
        el: ".main-content",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        backgroundColor: 0x141414,
        color2: 0xffff,
        speedLimit: 6.0,
        separation: 93.0,
        alignment: 30.0,
        cohesion: 22.0,
        quantity: 3.0,
      });
    </script>
  </body>
</html>
